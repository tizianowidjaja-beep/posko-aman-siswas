<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verifikasi Akses Posko Aman 🎟️</title>
  <style>
    @import url('https://googleapis.com');

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Fredoka', sans-serif; }

    body {
      background-color: #ff6b6b; 
      background-image: repeating-linear-gradient(45deg, #ff6b6b, #ff6b6b 20px, #ff8787 20px, #ff8787 40px); 
      min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px;
    }

    .redeem-top-bar {
      width: 100%; max-width: 450px; background: #ffff00; border: 4px solid #000000;
      border-radius: 16px; padding: 12px; margin-bottom: 20px; box-shadow: 6px 6px 0px #000000;
      text-align: center; font-size: 14px; font-weight: bold;
    }
    .status-locked { color: #ff0000; animation: pulseText 1s infinite alternate; }
    @keyframes pulseText { from { opacity: 1; } to { opacity: 0.5; } }

    .redeem-box {
      background: #ffffff; border: 5px solid #000000; border-radius: 32px;
      padding: 40px 25px; box-shadow: 12px 12px 0px #00ffff; text-align: center;
      max-width: 450px; width: 100%;
    }
    .redeem-box h2 { font-size: 26px; margin-bottom: 12px; color: #000; }
    .redeem-box p { font-size: 14px; margin-bottom: 25px; color: #334155; line-height: 1.5; }
    .redeem-box .studio-tag { background: #000; color: #fff; padding: 3px 10px; border-radius: 8px; font-weight: bold; }
    
    .redeem-input {
      width: 100%; background: #fff; border: 4px solid #000; border-radius: 16px;
      padding: 15px; font-size: 16px; font-weight: 700; text-align: center; letter-spacing: 1px; margin-bottom: 15px;
    }
    .redeem-input:focus { outline: none; background: #fffda2; }
    
    .btn-verify {
      width: 100%; background: #ffff00; color: #000; border: 4px solid #000;
      border-radius: 16px; padding: 14px; font-size: 16px; font-weight: 700;
      cursor: pointer; box-shadow: 0px 5px 0px #000;
    }
    .btn-verify:active { transform: translateY(3px); box-shadow: 0px 2px 0px #000; }
    .error-msg { color: #ef4444; font-size: 13px; font-weight: bold; margin-top: 12px; display: none; }
  </style>
</head>
<body>

  <div class="redeem-top-bar">
    🔑 STATUS AKSES WEBSITE: <span class="status-locked">TERKUNCI (Wajib Kode Redeem)</span>
  </div>

  <div class="redeem-box">
    <h2>🎟️ VERIFIKASI AKSES POSKO</h2>
    <p>Halaman ini sedang berada dalam masa Event Terbatas <span class="studio-tag">Ketok Mejik Studio</span>! Masukkan Kode Redeem dari TikTok/YouTube untuk mendobrak pintu sistem!</p>
    
    <input type="text" id="redeemInputCode" class="redeem-input" placeholder="Masukkan kode redeem...">
    <div id="redeemError" class="error-msg">⚠️ KODE REDEEM SALAH! Akses ditolak sistem radar.</div>
    <br>
    <button type="button" class="btn-verify" onclick="checkRedeemCode()">BUKA KUNCI WEBSITE 🔓</button>
  </div>

  <script>
    const KODE_RAHASIA = '50VIewsBERKAh")';

    function checkRedeemCode() {
      const inputVal = document.getElementById('redeemInputCode').value;
      const errorText = document.getElementById('redeemError');

      if (inputVal === KODE_RAHASIA) {
        alert('🔓 ACCESS GRANTED! Mengalihkan ke Arena Gameboy AS-Man...');
        window.location.href = "game.html";
      } else {
        errorText.style.display = 'block';
        document.getElementById('redeemInputCode').value = '';
      }
    }
  </script>
</body>
</html>
